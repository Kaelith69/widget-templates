<svg viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg" width="500" height="200">
  <defs>
    <style>
      .mono { font-family: 'Courier New', monospace; }
      .timezone { animation: timezonein 0.8s ease-out both; opacity: 0; }
      .t1{animation-delay:0.1s} .t2{animation-delay:0.2s} .t3{animation-delay:0.3s}
      .t4{animation-delay:0.4s} .t5{animation-delay:0.5s} .t6{animation-delay:0.6s}
      @keyframes timezonein { to { opacity: 1; } }
      .clock-hand { animation: tick 2s linear infinite; transform-origin: center; }
      @keyframes tick { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      .sun { animation: sunmove 24s linear infinite; }
      @keyframes sunmove { 0% { cx: 100; } 25% { cx: 200; } 50% { cx: 300; } 75% { cx: 400; } 100% { cx: 100; } }
    </style>
  </defs>

  <rect width="500" height="200" rx="10" fill="linear-gradient(90deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)"/>
  <rect x="1" y="1" width="498" height="198" rx="9" fill="none" stroke="#e94560" opacity="0.3"/>

  <!-- Sun -->
  <circle cx="100" cy="50" r="15" fill="#ffd700" class="sun"/>
  <circle cx="100" cy="50" r="20" fill="#ffd700" opacity="0.2" class="sun"/>

  <!-- Current time -->
  <text x="250" y="30" text-anchor="middle" class="mono timezone t1" font-size="16" fill="#ffffff" font-weight="bold">Current Time</text>
  <text x="250" y="55" text-anchor="middle" class="mono timezone t1" font-size="24" fill="#00d4ff">14:32:15</text>
  <text x="250" y="75" text-anchor="middle" class="mono timezone t1" font-size="12" fill="#b0b0b0">February 21, 2026</text>

  <!-- Time zones -->
  <g class="timezone t2">
    <text x="50" y="110" class="mono" font-size="12" fill="#ffffff">🇺🇸 New York:</text>
    <text x="150" y="110" class="mono" font-size="14" fill="#00d4ff">09:32:15</text>
    <text x="220" y="110" class="mono" font-size="10" fill="#b0b0b0">EST</text>
  </g>

  <g class="timezone t3">
    <text x="50" y="130" class="mono" font-size="12" fill="#ffffff">🇬🇧 London:</text>
    <text x="150" y="130" class="mono" font-size="14" fill="#00d4ff">14:32:15</text>
    <text x="220" y="130" class="mono" font-size="10" fill="#b0b0b0">GMT</text>
  </g>

  <g class="timezone t4">
    <text x="50" y="150" class="mono" font-size="12" fill="#ffffff">🇯🇵 Tokyo:</text>
    <text x="150" y="150" class="mono" font-size="14" fill="#00d4ff">23:32:15</text>
    <text x="220" y="150" class="mono" font-size="10" fill="#b0b0b0">JST</text>
  </g>

  <g class="timezone t5">
    <text x="50" y="170" class="mono" font-size="12" fill="#ffffff">🇦🇺 Sydney:</text>
    <text x="150" y="170" class="mono" font-size="14" fill="#00d4ff">01:32:15</text>
    <text x="220" y="170" class="mono" font-size="10" fill="#b0b0b0">AEDT</text>
  </g>

  <!-- Mini clock -->
  <circle cx="400" cy="120" r="30" fill="#2a2a2a" stroke="#00d4ff" stroke-width="2"/>
  <line x1="400" y1="120" x2="400" y2="105" stroke="#00d4ff" stroke-width="2" class="clock-hand"/>
  <line x1="400" y1="120" x2="410" y2="120" stroke="#ffffff" stroke-width="1" class="clock-hand"/>
  <circle cx="400" cy="120" r="2" fill="#00d4ff"/>

  <!-- Clock markers -->
  <circle cx="400" cy="100" r="1" fill="#ffffff"/>
  <circle cx="410" cy="105" r="1" fill="#ffffff"/>
  <circle cx="415" cy="120" r="1" fill="#ffffff"/>
  <circle cx="410" cy="135" r="1" fill="#ffffff"/>
  <circle cx="400" cy="140" r="1" fill="#ffffff"/>
  <circle cx="390" cy="135" r="1" fill="#ffffff"/>
  <circle cx="385" cy="120" r="1" fill="#ffffff"/>
  <circle cx="390" cy="105" r="1" fill="#ffffff"/>
</svg>