<svg viewBox="0 0 600 250" xmlns="http://www.w3.org/2000/svg" width="600" height="250">
  <defs>
    <style>
      .mono { font-family: 'Courier New', monospace; }
      .commit { animation: appear 0.5s ease-out both; opacity: 0; }
      .c1{animation-delay:0.1s} .c2{animation-delay:0.3s} .c3{animation-delay:0.5s}
      .c4{animation-delay:0.7s} .c5{animation-delay:0.9s} .c6{animation-delay:1.1s}
      @keyframes appear { to { opacity: 1; } }
      .branch { stroke-dasharray: 5,5; animation: draw 1.5s ease-out both; stroke-dashoffset: 100; }
      @keyframes draw { to { stroke-dashoffset: 0; } }
    </style>
  </defs>

  <rect width="600" height="250" rx="10" fill="#ffffff"/>
  <rect x="1" y="1" width="598" height="248" rx="9" fill="none" stroke="#e1e4e8"/>

  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" class="mono" font-size="16" fill="#24292e">Git Commit History</text>

  <!-- Branch line -->
  <line x1="50" y1="60" x2="550" y2="60" stroke="#0366d6" stroke-width="3" class="branch"/>
  <line x1="50" y1="60" x2="50" y2="200" stroke="#0366d6" stroke-width="3" class="branch"/>
  <line x1="50" y1="200" x2="550" y2="200" stroke="#0366d6" stroke-width="3" class="branch"/>

  <!-- Commits -->
  <circle cx="100" cy="60" r="8" fill="#28a745" class="commit c1"/>
  <circle cx="200" cy="60" r="8" fill="#28a745" class="commit c2"/>
  <circle cx="300" cy="60" r="8" fill="#28a745" class="commit c3"/>
  <circle cx="400" cy="60" r="8" fill="#28a745" class="commit c4"/>
  <circle cx="500" cy="60" r="8" fill="#28a745" class="commit c5"/>
  <circle cx="100" cy="200" r="8" fill="#0366d6" class="commit c6"/>

  <!-- Commit messages -->
  <text x="120" y="75" class="mono commit c1" font-size="11" fill="#586069">feat: add new widgets</text>
  <text x="220" y="75" class="mono commit c2" font-size="11" fill="#586069">fix: animation timing</text>
  <text x="320" y="75" class="mono commit c3" font-size="11" fill="#586069">docs: update README</text>
  <text x="420" y="75" class="mono commit c4" font-size="11" fill="#586069">style: improve colors</text>
  <text x="520" y="75" class="mono commit c5" font-size="11" fill="#586069">refactor: optimize SVG</text>
  <text x="120" y="215" class="mono commit c6" font-size="11" fill="#586069">merge: main branch</text>

  <!-- Dates -->
  <text x="120" y="90" class="mono commit c1" font-size="9" fill="#959da5">2 days ago</text>
  <text x="220" y="90" class="mono commit c2" font-size="9" fill="#959da5">1 day ago</text>
  <text x="320" y="90" class="mono commit c3" font-size="9" fill="#959da5">5 hours ago</text>
  <text x="420" y="90" class="mono commit c4" font-size="9" fill="#959da5">2 hours ago</text>
  <text x="520" y="90" class="mono commit c5" font-size="9" fill="#959da5">30 min ago</text>
  <text x="120" y="230" class="mono commit c6" font-size="9" fill="#959da5">10 min ago</text>
</svg>