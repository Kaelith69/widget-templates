<svg viewBox="0 0 680 155" xmlns="http://www.w3.org/2000/svg" width="680" height="155">
  <defs>
    <style>
      .mono { font-family: 'Courier New', monospace; }
      .blink { animation: blink 1.1s step-end infinite; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      .row { animation: fadein 0.5s ease-out both; opacity: 0; }
      .r1{animation-delay:0.1s} .r2{animation-delay:0.3s}
      .r3{animation-delay:0.5s} .r4{animation-delay:0.7s}
      .r5{animation-delay:0.9s} .r6{animation-delay:1.1s}
      @keyframes fadein { to { opacity: 1; } }
    </style>
  </defs>

  <rect width="680" height="155" rx="10" fill="#0d1117"/>
  <rect x="1" y="1" width="678" height="153" rx="9" fill="none" stroke="#21262d"/>

  <!-- title bar -->
  <rect width="680" height="26" rx="10" fill="#161b22"/>
  <rect y="16" width="680" height="10" fill="#161b22"/>
  <circle cx="12" cy="13" r="3.5" fill="#ff5f57"/>
  <circle cx="22" cy="13" r="3.5" fill="#febc2e"/>
  <circle cx="32" cy="13" r="3.5" fill="#28c840"/>
  <text x="340" y="17" text-anchor="middle" class="mono" font-size="9" fill="#484f58">github_stats.sh</text>

  <text x="16" y="48" class="mono row r1" font-size="11" fill="#484f58">$ ./fetch_stats.sh --user kaelith69</text>
  
  <text x="16" y="68" class="mono row r2" font-size="11" fill="#e6edf3">[+] <tspan fill="#58a6ff">Repositories:</tspan> 48</text>
  <text x="200" y="68" class="mono row r3" font-size="11" fill="#e6edf3">[+] <tspan fill="#3fb950">Followers:</tspan> 12</text>
  <text x="380" y="68" class="mono row r4" font-size="11" fill="#e6edf3">[+] <tspan fill="#d2a8ff">Following:</tspan> 13</text>
  
  <text x="16" y="88" class="mono row r5" font-size="11" fill="#e6edf3">[+] <tspan fill="#e3b341">Top Languages:</tspan> HTML, CSS, JavaScript, Python</text>

  <text x="16" y="118" class="mono row r6" font-size="11" fill="#484f58">$ echo "Always coding, sometimes debugging..." <tspan class="blink" fill="#3fb950">&#x25AE;</tspan></text>
</svg>
