<svg viewBox="0 0 450 150" xmlns="http://www.w3.org/2000/svg" width="450" height="150">
  <defs>
    <style>
      .mono { font-family: 'Courier New', monospace; }
      .music { animation: bounce 1s ease-in-out infinite; }
      .m1{animation-delay:0s} .m2{animation-delay:0.1s} .m3{animation-delay:0.2s}
      .m4{animation-delay:0.3s} .m5{animation-delay:0.4s}
      @keyframes bounce { 0%,20%,50%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-10px); } 60% { transform: translateY(-5px); } }
      .progress { animation: progress 3s linear infinite; }
      @keyframes progress { from { width: 0; } to { width: 300px; } }
      .fade { animation: fadein 0.8s ease-out both; opacity: 0; }
      .f1{animation-delay:0.2s} .f2{animation-delay:0.4s} .f3{animation-delay:0.6s}
      .f4{animation-delay:0.8s} .f5{animation-delay:1.0s}
      @keyframes fadein { to { opacity: 1; } }
    </style>
  </defs>

  <rect width="450" height="150" rx="10" fill="#2c2c2c"/>
  <rect x="1" y="1" width="448" height="148" rx="9" fill="none" stroke="#444444"/>

  <!-- Album art -->
  <rect x="20" y="20" width="80" height="80" rx="5" fill="#1db954"/>
  <text x="60" y="65" text-anchor="middle" class="mono" font-size="20" fill="#ffffff">♪</text>

  <!-- Song info -->
  <text x="120" y="45" class="mono fade f1" font-size="14" fill="#ffffff" font-weight="bold">Now Playing</text>
  <text x="120" y="65" class="mono fade f2" font-size="12" fill="#1db954">Bohemian Rhapsody</text>
  <text x="120" y="80" class="mono fade f3" font-size="10" fill="#b3b3b3">Queen</text>

  <!-- Progress bar -->
  <rect x="120" y="95" width="300" height="4" rx="2" fill="#535353"/>
  <rect x="120" y="95" width="150" height="4" rx="2" fill="#1db954" class="progress"/>

  <!-- Time -->
  <text x="120" y="120" class="mono fade f4" font-size="10" fill="#b3b3b3">2:34</text>
  <text x="410" y="120" text-anchor="end" class="mono fade f5" font-size="10" fill="#b3b3b3">5:55</text>

  <!-- Controls -->
  <circle cx="200" cy="130" r="15" fill="#535353"/>
  <text x="200" y="137" text-anchor="middle" class="mono" font-size="12" fill="#ffffff">⏮</text>

  <circle cx="240" cy="130" r="20" fill="#1db954"/>
  <text x="240" y="138" text-anchor="middle" class="mono" font-size="14" fill="#ffffff">▶</text>

  <circle cx="280" cy="130" r="15" fill="#535353"/>
  <text x="280" y="137" text-anchor="middle" class="mono" font-size="12" fill="#ffffff">⏭</text>

  <!-- Volume -->
  <text x="320" y="137" class="mono fade f1" font-size="10" fill="#b3b3b3">🔊</text>
  <rect x="335" y="130" width="60" height="4" rx="2" fill="#535353"/>
  <rect x="335" y="130" width="45" height="4" rx="2" fill="#1db954"/>

  <!-- Equalizer bars -->
  <rect x="30" y="110" width="4" height="10" fill="#1db954" class="music m1"/>
  <rect x="40" y="105" width="4" height="15" fill="#1db954" class="music m2"/>
  <rect x="50" y="100" width="4" height="20" fill="#1db954" class="music m3"/>
  <rect x="60" y="110" width="4" height="10" fill="#1db954" class="music m4"/>
  <rect x="70" y="105" width="4" height="15" fill="#1db954" class="music m5"/>
</svg>