<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" width="400" height="300">
  <defs>
    <style>
      .mono { font-family: 'Courier New', monospace; }
      .slide { animation: slidein 0.6s ease-out both; transform: translateX(-20px); opacity: 0; }
      .s1{animation-delay:0.1s} .s2{animation-delay:0.2s} .s3{animation-delay:0.3s}
      .s4{animation-delay:0.4s} .s5{animation-delay:0.5s} .s6{animation-delay:0.6s}
      .s7{animation-delay:0.7s} .s8{animation-delay:0.8s}
      @keyframes slidein { to { transform: translateX(0); opacity: 1; } }
    </style>
  </defs>

  <rect width="400" height="300" rx="8" fill="#f3f3f3"/>
  <rect x="1" y="1" width="398" height="298" rx="7" fill="none" stroke="#cccccc"/>

  <!-- Title bar -->
  <rect width="400" height="40" rx="8" fill="#ffffff"/>
  <rect y="30" width="400" height="10" fill="#ffffff"/>
  <circle cx="15" cy="20" r="5" fill="#ff5f57"/>
  <circle cx="35" cy="20" r="5" fill="#febc2e"/>
  <circle cx="55" cy="20" r="5" fill="#28c840"/>
  <text x="200" y="25" text-anchor="middle" class="mono" font-size="12" fill="#333333">Finder - Projects</text>

  <!-- Sidebar -->
  <rect x="0" y="40" width="120" height="260" fill="#e8e8e8"/>
  <text x="10" y="65" class="mono slide s1" font-size="11" fill="#666666">📁 Projects</text>
  <text x="10" y="85" class="mono slide s2" font-size="11" fill="#666666">📁 Documents</text>
  <text x="10" y="105" class="mono slide s3" font-size="11" fill="#666666">📁 Downloads</text>
  <text x="10" y="125" class="mono slide s4" font-size="11" fill="#666666">💻 Desktop</text>

  <!-- Main area -->
  <text x="140" y="70" class="mono slide s5" font-size="12" fill="#333333">📁 widget-templates</text>
  <text x="140" y="95" class="mono slide s6" font-size="12" fill="#333333">📄 README.md</text>
  <text x="140" y="120" class="mono slide s7" font-size="12" fill="#333333">🖼️ github-stats.svg</text>
  <text x="140" y="145" class="mono slide s8" font-size="12" fill="#333333">🖼️ skills.svg</text>

  <!-- Icons -->
  <circle cx="155" cy="62" r="8" fill="#4a90e2"/>
  <circle cx="155" cy="87" r="8" fill="#f5a623"/>
  <circle cx="155" cy="112" r="8" fill="#7ed321"/>
  <circle cx="155" cy="137" r="8" fill="#d0021b"/>
</svg>