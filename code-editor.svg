<svg viewBox="0 0 680 200" xmlns="http://www.w3.org/2000/svg" width="680" height="200">
  <defs>
    <style>
      .mono { font-family: 'Courier New', monospace; }
      .fade { animation: fadein 0.8s ease-out both; opacity: 0; }
      .f1{animation-delay:0.1s} .f2{animation-delay:0.3s} .f3{animation-delay:0.5s}
      .f4{animation-delay:0.7s} .f5{animation-delay:0.9s} .f6{animation-delay:1.1s}
      @keyframes fadein { to { opacity: 1; } }
      .cursor { animation: blink 1s step-end infinite; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    </style>
  </defs>

  <rect width="680" height="200" rx="10" fill="#1e1e1e"/>
  <rect x="1" y="1" width="678" height="198" rx="9" fill="none" stroke="#3c3c3c"/>

  <!-- Title bar -->
  <rect width="680" height="30" rx="10" fill="#2d2d30"/>
  <rect y="20" width="680" height="10" fill="#2d2d30"/>
  <circle cx="15" cy="15" r="4" fill="#ff5f57"/>
  <circle cx="30" cy="15" r="4" fill="#febc2e"/>
  <circle cx="45" cy="15" r="4" fill="#28c840"/>
  <text x="340" y="20" text-anchor="middle" class="mono" font-size="10" fill="#cccccc">code.py - Visual Studio Code</text>

  <!-- Line numbers -->
  <text x="20" y="55" class="mono fade f1" font-size="12" fill="#858585">1</text>
  <text x="20" y="75" class="mono fade f2" font-size="12" fill="#858585">2</text>
  <text x="20" y="95" class="mono fade f3" font-size="12" fill="#858585">3</text>
  <text x="20" y="115" class="mono fade f4" font-size="12" fill="#858585">4</text>
  <text x="20" y="135" class="mono fade f5" font-size="12" fill="#858585">5</text>
  <text x="20" y="155" class="mono fade f6" font-size="12" fill="#858585">6</text>

  <!-- Code -->
  <text x="45" y="55" class="mono fade f1" font-size="12" fill="#569cd6">def</text>
  <text x="75" y="55" class="mono fade f1" font-size="12" fill="#dcdcaa">hello_world</text>
  <text x="155" y="55" class="mono fade f1" font-size="12" fill="#569cd6">():</text>

  <text x="45" y="75" class="mono fade f2" font-size="12" fill="#d4d4d4">    </text>
  <text x="75" y="75" class="mono fade f2" font-size="12" fill="#ce9178">"Hello, World!"</text>
  <text x="175" y="75" class="mono fade f2" font-size="12" fill="#d4d4d4">)</text>

  <text x="45" y="95" class="mono fade f3" font-size="12" fill="#569cd6">if</text>
  <text x="65" y="95" class="mono fade f3" font-size="12" fill="#9cdcfe">__name__</text>
  <text x="125" y="95" class="mono fade f3" font-size="12" fill="#d4d4d4">== </text>
  <text x="145" y="95" class="mono fade f3" font-size="12" fill="#ce9178">"__main__"</text>
  <text x="205" y="95" class="mono fade f3" font-size="12" fill="#569cd6">:</text>

  <text x="45" y="115" class="mono fade f4" font-size="12" fill="#d4d4d4">    </text>
  <text x="75" y="115" class="mono fade f4" font-size="12" fill="#dcdcaa">hello_world</text>
  <text x="155" y="115" class="mono fade f4" font-size="12" fill="#d4d4d4">()</text>

  <text x="45" y="135" class="mono fade f5" font-size="12" fill="#6a9955"># Always coding, sometimes debugging...</text>

  <text x="45" y="155" class="mono fade f6" font-size="12" fill="#d4d4d4">    </text>
  <text x="75" y="155" class="mono fade f6" font-size="12" fill="#569cd6">print</text>
  <text x="105" y="155" class="mono fade f6" font-size="12" fill="#d4d4d4">(</text>
  <text x="115" y="155" class="mono fade f6" font-size="12" fill="#ce9178">"Hello from the other side!"</text>
  <text x="265" y="155" class="mono fade f6" font-size="12" fill="#d4d4d4">)</text>
  <text x="275" y="155" class="mono fade f6 cursor" font-size="12" fill="#d4d4d4">|</text>

  <!-- Status bar -->
  <rect x="0" y="170" width="680" height="30" fill="#007acc"/>
  <text x="10" y="190" class="mono" font-size="10" fill="#ffffff">Ln 6, Col 28</text>
  <text x="570" y="190" text-anchor="end" class="mono" font-size="10" fill="#ffffff">Python</text>
</svg>