<svg viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg" width="500" height="200">
  <defs>
    <style>
      .mono { font-family: 'Courier New', monospace; }
      .system { animation: systemin 0.6s ease-out both; opacity: 0; }
      .s1{animation-delay:0.1s} .s2{animation-delay:0.2s} .s3{animation-delay:0.3s}
      .s4{animation-delay:0.4s} .s5{animation-delay:0.5s}
      @keyframes systemin { to { opacity: 1; } }
      .cpu-bar { animation: cpu 2s ease-in-out infinite; }
      @keyframes cpu { 0%,100% { height: 40; } 50% { height: 60; } }
      .ram-bar { animation: ram 2.5s ease-in-out infinite; }
      @keyframes ram { 0%,100% { height: 35; } 50% { height: 55; } }
      .disk-bar { animation: disk 3s ease-in-out infinite; }
      @keyframes disk { 0%,100% { height: 25; } 50% { height: 45; } }
      .network { animation: network 1.5s ease-in-out infinite; }
      @keyframes network { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
  </defs>

  <rect width="500" height="200" rx="10" fill="#1a1a1a"/>
  <rect x="1" y="1" width="498" height="198" rx="9" fill="none" stroke="#333333"/>

  <!-- Title -->
  <text x="250" y="25" text-anchor="middle" class="mono system s1" font-size="16" fill="#00ff00" font-weight="bold">System Monitor</text>

  <!-- CPU Section -->
  <text x="20" y="55" class="mono system s2" font-size="12" fill="#ffffff">CPU Usage:</text>
  <rect x="100" y="40" width="80" height="80" rx="5" fill="#2a2a2a"/>
  <rect x="110" y="80" width="20" height="40" fill="#00ff00" class="cpu-bar"/>
  <rect x="140" y="85" width="20" height="35" fill="#00ff00" class="cpu-bar"/>
  <text x="190" y="55" class="mono system s2" font-size="12" fill="#00ff00">67%</text>

  <!-- RAM Section -->
  <text x="250" y="55" class="mono system s3" font-size="12" fill="#ffffff">RAM Usage:</text>
  <rect x="330" y="40" width="80" height="80" rx="5" fill="#2a2a2a"/>
  <rect x="340" y="75" width="15" height="35" fill="#0080ff" class="ram-bar"/>
  <rect x="365" y="80" width="15" height="30" fill="#0080ff" class="ram-bar"/>
  <rect x="390" y="70" width="15" height="40" fill="#0080ff" class="ram-bar"/>
  <text x="430" y="55" class="mono system s3" font-size="12" fill="#0080ff">4.2GB / 8GB</text>

  <!-- Disk Section -->
  <text x="20" y="135" class="mono system s4" font-size="12" fill="#ffffff">Disk Usage:</text>
  <rect x="100" y="120" width="150" height="20" rx="10" fill="#2a2a2a"/>
  <rect x="100" y="120" width="120" height="20" rx="10" fill="#ff8000"/>
  <text x="270" y="135" class="mono system s4" font-size="12" fill="#ff8000">240GB / 500GB</text>

  <!-- Network Section -->
  <text x="20" y="165" class="mono system s5" font-size="12" fill="#ffffff">Network:</text>
  <circle cx="100" cy="160" r="8" fill="#2a2a2a"/>
  <circle cx="100" cy="160" r="6" fill="#00ff80" class="network"/>
  <text x="120" y="165" class="mono system s5" font-size="12" fill="#00ff80">↑ 2.1 MB/s</text>
  <text x="200" y="165" class="mono system s5" font-size="12" fill="#ff0080">↓ 1.8 MB/s</text>

  <!-- System Info -->
  <text x="350" y="135" class="mono system s4" font-size="10" fill="#888888">OS: Windows 11</text>
  <text x="350" y="150" class="mono system s4" font-size="10" fill="#888888">Uptime: 3d 4h 22m</text>
  <text x="350" y="165" class="mono system s5" font-size="10" fill="#888888">Temp: 45°C</text>
</svg>