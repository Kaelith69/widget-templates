<svg viewBox="0 0 330 155" xmlns="http://www.w3.org/2000/svg" width="330" height="155">
  <defs>
    <style>
      .mono { font-family: 'Courier New', monospace; }
      .blink { animation: blink 1.1s step-end infinite; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      .row { animation: fadein 0.5s ease-out both; opacity: 0; }
      .r1{animation-delay:0.1s} .r2{animation-delay:0.35s}
      .r3{animation-delay:0.6s} .r4{animation-delay:0.85s}
      .r5{animation-delay:1.1s}
      @keyframes fadein { to { opacity: 1; } }
    </style>
  </defs>

  <rect width="330" height="155" rx="10" fill="#0d1117"/>
  <rect x="1" y="1" width="328" height="153" rx="9" fill="none" stroke="#21262d"/>

  <!-- title bar -->
  <rect width="330" height="26" rx="10" fill="#161b22"/>
  <rect y="16" width="330" height="10" fill="#161b22"/>
  <circle cx="12" cy="13" r="3.5" fill="#ff5f57"/>
  <circle cx="22" cy="13" r="3.5" fill="#febc2e"/>
  <circle cx="32" cy="13" r="3.5" fill="#28c840"/>
  <text x="165" y="17" text-anchor="middle" class="mono" font-size="9" fill="#484f58">status.txt</text>

  <text x="16" y="48" class="mono row r1" font-size="11" fill="#484f58">$ whoami</text>
  <text x="16" y="63" class="mono row r2" font-size="11" fill="#e6edf3">kaelith69   <tspan fill="#484f58">// still figuring it out</tspan></text>

  <text x="16" y="83" class="mono row r3" font-size="11" fill="#484f58">$ current_status</text>
  <text x="16" y="98" class="mono row r4" font-size="11" fill="#e6edf3">&#x1F4DA; <tspan fill="#58a6ff">studying</tspan>  &#x1F4BB; <tspan fill="#3fb950">coding</tspan>  &#x1F3A8; <tspan fill="#e3b341">not finishing art</tspan></text>

  <text x="16" y="118" class="mono row r5" font-size="11" fill="#484f58">$ ping turing_test</text>
  <text x="16" y="133" class="mono" font-size="11" fill="#3fb950">Request timeout for seq 1 <tspan class="blink">&#x25AE;</tspan></text>
  <text x="16" y="148" class="mono" font-size="9" fill="#30363d">// main quest: still loading...</text>
</svg>
