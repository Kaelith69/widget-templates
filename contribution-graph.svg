<svg viewBox="0 0 600 150" xmlns="http://www.w3.org/2000/svg" width="600" height="150">
  <defs>
    <style>
      .mono { font-family: 'Courier New', monospace; }
      .contrib { animation: contribin 0.5s ease-out both; opacity: 0; }
      .c1{animation-delay:0.1s} .c2{animation-delay:0.2s} .c3{animation-delay:0.3s}
      .c4{animation-delay:0.4s} .c5{animation-delay:0.5s}
      @keyframes contribin { to { opacity: 1; } }
      .square { animation: fill 1s ease-out both; fill: #ebedf0; }
      .sq1{animation-delay:0.6s} .sq2{animation-delay:0.7s} .sq3{animation-delay:0.8s}
      .sq4{animation-delay:0.9s} .sq5{animation-delay:1.0s}
      @keyframes fill { to { fill: #9be9a8; } }
      .legend { animation: legendin 0.8s ease-out both; opacity: 0; }
      .l1{animation-delay:1.2s} .l2{animation-delay:1.3s} .l3{animation-delay:1.4s}
      @keyframes legendin { to { opacity: 1; } }
    </style>
  </defs>

  <rect width="600" height="150" rx="8" fill="#ffffff"/>
  <rect x="1" y="1" width="598" height="148" rx="7" fill="none" stroke="#d1d5db"/>

  <!-- Title -->
  <text x="300" y="20" text-anchor="middle" class="mono contrib c1" font-size="14" fill="#24292e" font-weight="bold">1,247 contributions in the last year</text>

  <!-- Months labels -->
  <text x="50" y="40" class="mono contrib c2" font-size="10" fill="#586069">Jan</text>
  <text x="110" y="40" class="mono contrib c2" font-size="10" fill="#586069">Feb</text>
  <text x="170" y="40" class="mono contrib c2" font-size="10" fill="#586069">Mar</text>
  <text x="230" y="40" class="mono contrib c2" font-size="10" fill="#586069">Apr</text>
  <text x="290" y="40" class="mono contrib c2" font-size="10" fill="#586069">May</text>
  <text x="350" y="40" class="mono contrib c2" font-size="10" fill="#586069">Jun</text>
  <text x="410" y="40" class="mono contrib c2" font-size="10" fill="#586069">Jul</text>
  <text x="470" y="40" class="mono contrib c2" font-size="10" fill="#586069">Aug</text>
  <text x="530" y="40" class="mono contrib c2" font-size="10" fill="#586069">Sep</text>

  <!-- Contribution grid -->
  <g class="contrib c3">
    <!-- Week 1 -->
    <rect x="30" y="50" width="10" height="10" rx="2" class="square sq1"/>
    <rect x="30" y="65" width="10" height="10" rx="2" class="square sq2"/>
    <rect x="30" y="80" width="10" height="10" rx="2" class="square sq3"/>
    <rect x="30" y="95" width="10" height="10" rx="2" class="square sq4"/>
    <rect x="30" y="110" width="10" height="10" rx="2" class="square sq5"/>
    <rect x="30" y="125" width="10" height="10" rx="2" class="square sq1"/>
    <rect x="30" y="140" width="10" height="10" rx="2" class="square sq2"/>

    <!-- Week 2 -->
    <rect x="45" y="50" width="10" height="10" rx="2" class="square sq3"/>
    <rect x="45" y="65" width="10" height="10" rx="2" class="square sq4"/>
    <rect x="45" y="80" width="10" height="10" rx="2" class="square sq5"/>
    <rect x="45" y="95" width="10" height="10" rx="2" class="square sq1"/>
    <rect x="45" y="110" width="10" height="10" rx="2" class="square sq2"/>
    <rect x="45" y="125" width="10" height="10" rx="2" class="square sq3"/>
    <rect x="45" y="140" width="10" height="10" rx="2" class="square sq4"/>

    <!-- Week 3 -->
    <rect x="60" y="50" width="10" height="10" rx="2" class="square sq5"/>
    <rect x="60" y="65" width="10" height="10" rx="2" class="square sq1"/>
    <rect x="60" y="80" width="10" height="10" rx="2" class="square sq2"/>
    <rect x="60" y="95" width="10" height="10" rx="2" class="square sq3"/>
    <rect x="60" y="110" width="10" height="10" rx="2" class="square sq4"/>
    <rect x="60" y="125" width="10" height="10" rx="2" class="square sq5"/>
    <rect x="60" y="140" width="10" height="10" rx="2" class="square sq1"/>

    <!-- Week 4 -->
    <rect x="75" y="50" width="10" height="10" rx="2" class="square sq2"/>
    <rect x="75" y="65" width="10" height="10" rx="2" class="square sq3"/>
    <rect x="75" y="80" width="10" height="10" rx="2" class="square sq4"/>
    <rect x="75" y="95" width="10" height="10" rx="2" class="square sq5"/>
    <rect x="75" y="110" width="10" height="10" rx="2" class="square sq1"/>
    <rect x="75" y="125" width="10" height="10" rx="2" class="square sq2"/>
    <rect x="75" y="140" width="10" height="10" rx="2" class="square sq3"/>
  </g>

  <!-- Continue with more weeks (simplified for brevity) -->
  <g class="contrib c4">
    <!-- Weeks 5-12 (showing pattern) -->
    <rect x="90" y="50" width="10" height="10" rx="2" fill="#9be9a8"/>
    <rect x="105" y="50" width="10" height="10" rx="2" fill="#40c463"/>
    <rect x="120" y="50" width="10" height="10" rx="2" fill="#30a14e"/>
    <rect x="135" y="50" width="10" height="10" rx="2" fill="#216e39"/>
    <rect x="150" y="50" width="10" height="10" rx="2" fill="#9be9a8"/>
    <rect x="165" y="50" width="10" height="10" rx="2" fill="#40c463"/>
    <rect x="180" y="50" width="10" height="10" rx="2" fill="#30a14e"/>
    <rect x="195" y="50" width="10" height="10" rx="2" fill="#216e39"/>
  </g>

  <!-- Legend -->
  <g class="legend l1">
    <text x="400" y="70" class="mono" font-size="12" fill="#24292e">Less</text>
    <rect x="430" y="60" width="10" height="10" rx="2" fill="#ebedf0"/>
    <rect x="445" y="60" width="10" height="10" rx="2" fill="#9be9a8"/>
    <rect x="460" y="60" width="10" height="10" rx="2" fill="#40c463"/>
    <rect x="475" y="60" width="10" height="10" rx="2" fill="#30a14e"/>
    <rect x="490" y="60" width="10" height="10" rx="2" fill="#216e39"/>
    <text x="510" y="70" class="mono" font-size="12" fill="#24292e">More</text>
  </g>

  <!-- Stats -->
  <g class="legend l2">
    <text x="400" y="95" class="mono" font-size="11" fill="#586069">Total: 1,247</text>
    <text x="400" y="110" class="mono" font-size="11" fill="#586069">Longest streak: 28 days</text>
    <text x="400" y="125" class="mono" font-size="11" fill="#586069">Current streak: 5 days</text>
  </g>
</svg>