<svg viewBox="0 0 450 250" xmlns="http://www.w3.org/2000/svg" width="450" height="250">
  <defs>
    <style>
      .mono { font-family: 'Courier New', monospace; }
      .progress { animation: progressin 0.8s ease-out both; opacity: 0; }
      .p1{animation-delay:0.1s} .p2{animation-delay:0.2s} .p3{animation-delay:0.3s}
      .p4{animation-delay:0.4s} .p5{animation-delay:0.5s} .p6{animation-delay:0.6s}
      @keyframes progressin { to { opacity: 1; } }
      .bar-fill { animation: fill 2s ease-out both; transform-origin: left center; transform: scaleX(0); }
      .b1{animation-delay:0.8s} .b2{animation-delay:1.0s} .b3{animation-delay:1.2s}
      .b4{animation-delay:1.4s} .b5{animation-delay:1.6s}
      @keyframes fill { to { transform: scaleX(1); } }
      .checkmark { animation: check 0.5s ease-out both; stroke-dasharray: 100; stroke-dashoffset: 100; }
      .c1{animation-delay:1.8s} .c2{animation-delay:2.0s} .c3{animation-delay:2.2s}
      @keyframes check { to { stroke-dashoffset: 0; } }
    </style>
  </defs>

  <rect width="450" height="250" rx="10" fill="#ffffff"/>
  <rect x="1" y="1" width="448" height="248" rx="9" fill="none" stroke="#e1e4e8"/>

  <!-- Title -->
  <text x="225" y="30" text-anchor="middle" class="mono progress p1" font-size="18" fill="#24292e" font-weight="bold">Project Progress</text>

  <!-- Task 1 -->
  <g class="progress p2">
    <text x="30" y="65" class="mono" font-size="14" fill="#24292e">🎯 Setup Project Structure</text>
    <rect x="30" y="70" width="300" height="8" rx="4" fill="#e1e4e8"/>
    <rect x="30" y="70" width="300" height="8" rx="4" fill="#28a745" class="bar-fill b1"/>
    <text x="350" y="65" text-anchor="end" class="mono" font-size="12" fill="#28a745">100%</text>
    <polyline points="340,60 345,65 350,60" fill="none" stroke="#28a745" stroke-width="2" class="checkmark c1"/>
  </g>

  <!-- Task 2 -->
  <g class="progress p3">
    <text x="30" y="100" class="mono" font-size="14" fill="#24292e">📝 Write Documentation</text>
    <rect x="30" y="105" width="300" height="8" rx="4" fill="#e1e4e8"/>
    <rect x="30" y="105" width="240" height="8" rx="4" fill="#28a745" class="bar-fill b2"/>
    <text x="350" y="100" text-anchor="end" class="mono" font-size="12" fill="#28a745">80%</text>
  </g>

  <!-- Task 3 -->
  <g class="progress p4">
    <text x="30" y="135" class="mono" font-size="14" fill="#24292e">⚙️ Implement Core Features</text>
    <rect x="30" y="140" width="300" height="8" rx="4" fill="#e1e4e8"/>
    <rect x="30" y="140" width="180" height="8" rx="4" fill="#0366d6" class="bar-fill b3"/>
    <text x="350" y="135" text-anchor="end" class="mono" font-size="12" fill="#0366d6">60%</text>
  </g>

  <!-- Task 4 -->
  <g class="progress p5">
    <text x="30" y="170" class="mono" font-size="14" fill="#24292e">🎨 Design UI Components</text>
    <rect x="30" y="175" width="300" height="8" rx="4" fill="#e1e4e8"/>
    <rect x="30" y="175" width="120" height="8" rx="4" fill="#ffd33d" class="bar-fill b4"/>
    <text x="350" y="170" text-anchor="end" class="mono" font-size="12" fill="#ffd33d">40%</text>
  </g>

  <!-- Task 5 -->
  <g class="progress p6">
    <text x="30" y="205" class="mono" font-size="14" fill="#24292e">🚀 Deploy to Production</text>
    <rect x="30" y="210" width="300" height="8" rx="4" fill="#e1e4e8"/>
    <rect x="30" y="210" width="30" height="8" rx="4" fill="#d73a49" class="bar-fill b5"/>
    <text x="350" y="205" text-anchor="end" class="mono" font-size="12" fill="#d73a49">10%</text>
  </g>

  <!-- Overall progress -->
  <text x="30" y="235" class="mono progress p1" font-size="12" fill="#586069">Overall Progress: 58%</text>
  <rect x="30" y="240" width="200" height="6" rx="3" fill="#e1e4e8"/>
  <rect x="30" y="240" width="116" height="6" rx="3" fill="#0366d6"/>
</svg>