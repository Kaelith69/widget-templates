<svg viewBox="0 0 330 210" xmlns="http://www.w3.org/2000/svg" width="330" height="210">
  <defs>
    <style>
      .mono { font-family: 'Courier New', monospace; }
      .bar { animation: grow 1.4s cubic-bezier(.4,0,.2,1) both; transform-origin: left center; transform: scaleX(0); }
      .b1{animation-delay:0.2s} .b2{animation-delay:0.4s} .b3{animation-delay:0.6s}
      .b4{animation-delay:0.8s} .b5{animation-delay:1.0s} .b6{animation-delay:1.2s}
      @keyframes grow { to { transform: scaleX(1); } }
    </style>
  </defs>

  <rect width="330" height="210" rx="10" fill="#0d1117"/>
  <rect x="1" y="1" width="328" height="208" rx="9" fill="none" stroke="#21262d"/>

  <rect width="330" height="26" rx="10" fill="#161b22"/>
  <rect y="16" width="330" height="10" fill="#161b22"/>
  <circle cx="12" cy="13" r="3.5" fill="#ff5f57"/>
  <circle cx="22" cy="13" r="3.5" fill="#febc2e"/>
  <circle cx="32" cy="13" r="3.5" fill="#28c840"/>
  <text x="165" y="17" text-anchor="middle" class="mono" font-size="9" fill="#484f58">skill_issue.log</text>

  <!-- Row 1 -->
  <text x="14" y="47" class="mono" font-size="10" fill="#8b949e">Googling things</text>
  <text x="316" y="47" text-anchor="end" class="mono" font-size="10" fill="#484f58">95%</text>
  <rect x="14" y="51" width="258" height="4" rx="2" fill="#21262d"/>
  <rect x="14" y="51" width="245" height="4" rx="2" fill="#58a6ff" class="bar b1"/>

  <!-- Row 2 -->
  <text x="14" y="75" class="mono" font-size="10" fill="#8b949e">Procrastinating</text>
  <text x="316" y="75" text-anchor="end" class="mono" font-size="10" fill="#484f58">90%</text>
  <rect x="14" y="79" width="258" height="4" rx="2" fill="#21262d"/>
  <rect x="14" y="79" width="232" height="4" rx="2" fill="#f78166" class="bar b2"/>

  <!-- Row 3 -->
  <text x="14" y="103" class="mono" font-size="10" fill="#8b949e">Pretending to understand</text>
  <text x="316" y="103" text-anchor="end" class="mono" font-size="10" fill="#484f58">80%</text>
  <rect x="14" y="107" width="258" height="4" rx="2" fill="#21262d"/>
  <rect x="14" y="107" width="206" height="4" rx="2" fill="#d2a8ff" class="bar b3"/>

  <!-- Row 4 -->
  <text x="14" y="131" class="mono" font-size="10" fill="#8b949e">Actually coding</text>
  <text x="316" y="131" text-anchor="end" class="mono" font-size="10" fill="#484f58">60%</text>
  <rect x="14" y="135" width="258" height="4" rx="2" fill="#21262d"/>
  <rect x="14" y="135" width="155" height="4" rx="2" fill="#3fb950" class="bar b4"/>

  <!-- Row 5 -->
  <text x="14" y="159" class="mono" font-size="10" fill="#8b949e">Finishing procreate sketches</text>
  <text x="316" y="159" text-anchor="end" class="mono" font-size="10" fill="#484f58">5%</text>
  <rect x="14" y="163" width="258" height="4" rx="2" fill="#21262d"/>
  <rect x="14" y="163" width="13" height="4" rx="2" fill="#e3b341" class="bar b5"/>

  <!-- Row 6 -->
  <text x="14" y="187" class="mono" font-size="10" fill="#8b949e">Passing the Turing Test</text>
  <text x="316" y="187" text-anchor="end" class="mono" font-size="10" fill="#484f58">??%</text>
  <rect x="14" y="191" width="258" height="4" rx="2" fill="#21262d"/>
  <rect x="14" y="191" width="4" height="4" rx="2" fill="#ff7b72" class="bar b6"/>

  <text x="165" y="205" text-anchor="middle" class="mono" font-size="8" fill="#21262d">[ results may vary ]</text>
</svg>
