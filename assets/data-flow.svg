<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 240" width="820" height="240">
  <defs>
    <marker id="arrowFlow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,1 L9,5 L0,9 Z" fill="#F59E0B"/>
    </marker>
    <marker id="arrowErr" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,1 L9,5 L0,9 Z" fill="#FF5F57"/>
    </marker>
    <style>
      @keyframes flow {
        0%   { stroke-dashoffset: 20; }
        100% { stroke-dashoffset: 0; }
      }
      @keyframes flowErr {
        0%   { stroke-dashoffset: 16; }
        100% { stroke-dashoffset: 0; }
      }
      .flow-line    { stroke-dasharray: 7 4; animation: flow 1.1s linear infinite; }
      .flow-err     { stroke-dasharray: 6 4; animation: flowErr 1.1s linear infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="820" height="240" rx="12" fill="#0d1117"/>
  <text x="410" y="24" font-family="'Courier New', monospace" font-size="12" fill="#4B5563" text-anchor="middle">// data flow — from .svg file to animated pixels on screen</text>

  <!-- ─────── STAGE 1: SVG File ─────── -->
  <rect x="20" y="50" width="130" height="120" rx="8" fill="#1e293b" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="85" y="72" font-family="monospace" font-size="10" fill="#F59E0B" text-anchor="middle" font-weight="bold">1. SVG File</text>
  <line x1="44" y1="80" x2="126" y2="80" stroke="#4B5563" stroke-width="0.5"/>
  <text x="85" y="96"  font-family="monospace" font-size="9" fill="#4B5563" text-anchor="middle">static asset</text>
  <text x="85" y="110" font-family="monospace" font-size="9" fill="#4B5563" text-anchor="middle">in repo root</text>
  <text x="85" y="128" font-family="monospace" font-size="8" fill="#10B981" text-anchor="middle">skills.svg</text>
  <text x="85" y="142" font-family="monospace" font-size="8" fill="#10B981" text-anchor="middle">existential.svg</text>
  <text x="85" y="156" font-family="monospace" font-size="8" fill="#10B981" text-anchor="middle">rain.svg ...</text>

  <!-- Arrow 1→2 -->
  <line x1="150" y1="110" x2="183" y2="110" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#arrowFlow)" class="flow-line"/>

  <!-- ─────── STAGE 2: README reference ─────── -->
  <rect x="183" y="50" width="140" height="120" rx="8" fill="#1e293b" stroke="#2563EB" stroke-width="1.5"/>
  <text x="253" y="72" font-family="monospace" font-size="10" fill="#2563EB" text-anchor="middle" font-weight="bold">2. README.md</text>
  <line x1="200" y1="80" x2="306" y2="80" stroke="#4B5563" stroke-width="0.5"/>
  <text x="253" y="96"  font-family="monospace" font-size="9" fill="#4B5563" text-anchor="middle">markdown img ref</text>
  <text x="253" y="114" font-family="monospace" font-size="8" fill="#10B981" text-anchor="middle">![w](./skills.svg)</text>
  <text x="253" y="130" font-family="monospace" font-size="8" fill="#4B5563" text-anchor="middle">or</text>
  <text x="253" y="144" font-family="monospace" font-size="8" fill="#10B981" text-anchor="middle">&lt;img src="w.svg"/&gt;</text>
  <text x="253" y="160" font-family="monospace" font-size="8" fill="#4B5563" text-anchor="middle">in HTML page</text>

  <!-- Arrow 2→3 -->
  <line x1="323" y1="110" x2="357" y2="110" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#arrowFlow)" class="flow-line"/>

  <!-- ─────── STAGE 3: GitHub CDN / Camo ─────── -->
  <rect x="357" y="50" width="140" height="120" rx="8" fill="#1e293b" stroke="#10B981" stroke-width="1.5"/>
  <text x="427" y="68" font-family="monospace" font-size="10" fill="#10B981" text-anchor="middle" font-weight="bold">3. GitHub CDN</text>
  <text x="427" y="80" font-family="monospace" font-size="8" fill="#4B5563" text-anchor="middle">(camo proxy)</text>
  <line x1="374" y1="88" x2="480" y2="88" stroke="#4B5563" stroke-width="0.5"/>
  <text x="427" y="104" font-family="monospace" font-size="9" fill="#4B5563" text-anchor="middle">fetches raw SVG</text>
  <text x="427" y="118" font-family="monospace" font-size="9" fill="#4B5563" text-anchor="middle">sanitizes XML</text>
  <text x="427" y="132" font-family="monospace" font-size="9" fill="#FF5F57" text-anchor="middle">strips &lt;script&gt;</text>
  <text x="427" y="146" font-family="monospace" font-size="9" fill="#10B981" text-anchor="middle">keeps @keyframes</text>
  <text x="427" y="160" font-family="monospace" font-size="9" fill="#4B5563" text-anchor="middle">caches response</text>

  <!-- Arrow 3→4 success path -->
  <line x1="497" y1="110" x2="530" y2="110" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#arrowFlow)" class="flow-line"/>

  <!-- ─────── STAGE 4: Browser ─────── -->
  <rect x="530" y="50" width="140" height="120" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="600" y="72" font-family="monospace" font-size="10" fill="#a855f7" text-anchor="middle" font-weight="bold">4. Browser</text>
  <line x1="547" y1="80" x2="653" y2="80" stroke="#4B5563" stroke-width="0.5"/>
  <text x="600" y="96"  font-family="monospace" font-size="9" fill="#4B5563" text-anchor="middle">parses SVG/XML</text>
  <text x="600" y="110" font-family="monospace" font-size="9" fill="#4B5563" text-anchor="middle">applies CSS styles</text>
  <text x="600" y="124" font-family="monospace" font-size="9" fill="#4B5563" text-anchor="middle">starts @keyframes</text>
  <text x="600" y="138" font-family="monospace" font-size="9" fill="#4B5563" text-anchor="middle">GPU compositor</text>
  <text x="600" y="152" font-family="monospace" font-size="9" fill="#F59E0B" text-anchor="middle">renders @ 60fps</text>

  <!-- Arrow 4→5 -->
  <line x1="670" y1="110" x2="703" y2="110" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#arrowFlow)" class="flow-line"/>

  <!-- ─────── STAGE 5: Screen ─────── -->
  <rect x="703" y="50" width="100" height="120" rx="8" fill="#1e293b" stroke="#F59E0B" stroke-width="2"/>
  <text x="753" y="72" font-family="monospace" font-size="10" fill="#F59E0B" text-anchor="middle" font-weight="bold">5. Screen</text>
  <line x1="716" y1="80" x2="790" y2="80" stroke="#4B5563" stroke-width="0.5"/>
  <text x="753" y="98"  font-family="monospace" font-size="9" fill="#10B981" text-anchor="middle">✨ animated</text>
  <text x="753" y="112" font-family="monospace" font-size="9" fill="#10B981" text-anchor="middle">widget live</text>
  <text x="753" y="126" font-family="monospace" font-size="9" fill="#4B5563" text-anchor="middle">on profile</text>
  <text x="753" y="144" font-family="monospace" font-size="8" fill="#4B5563" text-anchor="middle">loops forever</text>
  <text x="753" y="158" font-family="monospace" font-size="8" fill="#4B5563" text-anchor="middle">no JS needed</text>

  <!-- Error / script-stripped path (below) -->
  <line x1="427" y1="170" x2="427" y2="195" stroke="#FF5F57" stroke-width="1" marker-end="url(#arrowErr)" class="flow-err"/>
  <rect x="340" y="195" width="174" height="26" rx="5" fill="#1e293b" stroke="#FF5F57" stroke-width="1"/>
  <text x="427" y="210" font-family="monospace" font-size="9" fill="#FF5F57" text-anchor="middle">⚠ &lt;script&gt; stripped · animations survive</text>

  <!-- Zero network calls note -->
  <text x="410" y="228" font-family="monospace" font-size="9" fill="#4B5563" text-anchor="middle">zero network calls from within the widget · all animation logic is inline CSS · no external resources</text>
</svg>
