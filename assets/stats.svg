<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 220" width="820" height="220">
  <defs>
    <style>
      @keyframes countUp {
        from { opacity: 0; transform: translateY(4px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .stat1{animation:countUp 0.5s ease both 0.1s}
      .stat2{animation:countUp 0.5s ease both 0.2s}
      .stat3{animation:countUp 0.5s ease both 0.3s}
      .stat4{animation:countUp 0.5s ease both 0.4s}
      .stat5{animation:countUp 0.5s ease both 0.5s}
    </style>
  </defs>

  <!-- Background -->
  <rect width="820" height="220" rx="12" fill="#0d1117"/>
  <text x="410" y="28" font-family="'Courier New', monospace" font-size="12" fill="#4B5563" text-anchor="middle">// performance stats — widget-templates</text>

  <!-- Divider -->
  <line x1="26" y1="38" x2="794" y2="38" stroke="#161b22" stroke-width="1.5"/>

  <!-- ─── CARD 1: Widget Count ─── -->
  <g class="stat1">
    <rect x="26" y="50" width="146" height="140" rx="8" fill="#161b22" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="99" y="100" font-family="'Courier New', monospace" font-size="40" fill="#F59E0B" text-anchor="middle" font-weight="bold">20</text>
    <text x="99" y="118" font-family="monospace" font-size="10" fill="#4B5563" text-anchor="middle">widgets</text>
    <line x1="46" y1="128" x2="152" y2="128" stroke="#4B5563" stroke-width="0.5"/>
    <text x="99" y="144" font-family="monospace" font-size="8.5" fill="#4B5563" text-anchor="middle">6 terminal · 4 code/git</text>
    <text x="99" y="158" font-family="monospace" font-size="8.5" fill="#4B5563" text-anchor="middle">6 utility · 4 social</text>
    <text x="99" y="178" font-family="monospace" font-size="8" fill="#F59E0B" text-anchor="middle">for every mood</text>
  </g>

  <!-- ─── CARD 2: File size ─── -->
  <g class="stat2">
    <rect x="182" y="50" width="146" height="140" rx="8" fill="#161b22" stroke="#2563EB" stroke-width="1.5"/>
    <text x="255" y="92" font-family="'Courier New', monospace" font-size="30" fill="#2563EB" text-anchor="middle" font-weight="bold">&lt;10KB</text>
    <text x="255" y="112" font-family="monospace" font-size="10" fill="#4B5563" text-anchor="middle">per widget</text>
    <line x1="202" y1="122" x2="308" y2="122" stroke="#4B5563" stroke-width="0.5"/>
    <text x="255" y="138" font-family="monospace" font-size="8.5" fill="#4B5563" text-anchor="middle">avg ~4–8 KB each</text>
    <text x="255" y="152" font-family="monospace" font-size="8.5" fill="#4B5563" text-anchor="middle">total repo ~140 KB</text>
    <text x="255" y="172" font-family="monospace" font-size="8.5" fill="#4B5563" text-anchor="middle">fits in a tweet (almost)</text>
    <text x="255" y="180" font-family="monospace" font-size="8" fill="#2563EB" text-anchor="middle">featherweight</text>
  </g>

  <!-- ─── CARD 3: JS runtime ─── -->
  <g class="stat3">
    <rect x="338" y="50" width="146" height="140" rx="8" fill="#161b22" stroke="#10B981" stroke-width="1.5"/>
    <text x="411" y="100" font-family="'Courier New', monospace" font-size="40" fill="#10B981" text-anchor="middle" font-weight="bold">0ms</text>
    <text x="411" y="118" font-family="monospace" font-size="10" fill="#4B5563" text-anchor="middle">JS runtime</text>
    <line x1="358" y1="128" x2="464" y2="128" stroke="#4B5563" stroke-width="0.5"/>
    <text x="411" y="144" font-family="monospace" font-size="8.5" fill="#4B5563" text-anchor="middle">CSS @keyframes only</text>
    <text x="411" y="158" font-family="monospace" font-size="8.5" fill="#4B5563" text-anchor="middle">GPU compositor thread</text>
    <text x="411" y="178" font-family="monospace" font-size="8" fill="#10B981" text-anchor="middle">main thread is free</text>
  </g>

  <!-- ─── CARD 4: Dependencies ─── -->
  <g class="stat4">
    <rect x="494" y="50" width="146" height="140" rx="8" fill="#161b22" stroke="#a855f7" stroke-width="1.5"/>
    <text x="567" y="100" font-family="'Courier New', monospace" font-size="40" fill="#a855f7" text-anchor="middle" font-weight="bold">0</text>
    <text x="567" y="118" font-family="monospace" font-size="10" fill="#4B5563" text-anchor="middle">dependencies</text>
    <line x1="514" y1="128" x2="620" y2="128" stroke="#4B5563" stroke-width="0.5"/>
    <text x="567" y="144" font-family="monospace" font-size="8.5" fill="#4B5563" text-anchor="middle">no node_modules</text>
    <text x="567" y="158" font-family="monospace" font-size="8.5" fill="#4B5563" text-anchor="middle">no supply chain dread</text>
    <text x="567" y="178" font-family="monospace" font-size="8" fill="#a855f7" text-anchor="middle">npm audit: N/A</text>
  </g>

  <!-- ─── CARD 5: Platforms ─── -->
  <g class="stat5">
    <rect x="650" y="50" width="144" height="140" rx="8" fill="#161b22" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="722" y="88" font-family="'Courier New', monospace" font-size="22" fill="#F59E0B" text-anchor="middle" font-weight="bold">100%</text>
    <text x="722" y="106" font-family="monospace" font-size="10" fill="#4B5563" text-anchor="middle">browser compat</text>
    <line x1="670" y1="116" x2="774" y2="116" stroke="#4B5563" stroke-width="0.5"/>
    <text x="722" y="132" font-family="monospace" font-size="8.5" fill="#4B5563" text-anchor="middle">Chrome · Firefox · Safari</text>
    <text x="722" y="146" font-family="monospace" font-size="8.5" fill="#4B5563" text-anchor="middle">Edge · Mobile browsers</text>
    <text x="722" y="160" font-family="monospace" font-size="8.5" fill="#10B981" text-anchor="middle">✓ GitHub Markdown</text>
    <text x="722" y="174" font-family="monospace" font-size="8.5" fill="#10B981" text-anchor="middle">✓ GitLab · Bitbucket</text>
    <text x="722" y="186" font-family="monospace" font-size="8" fill="#F59E0B" text-anchor="middle">everywhere SVG renders</text>
  </g>
</svg>
