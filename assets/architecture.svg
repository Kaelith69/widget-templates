<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 360" width="820" height="360">
  <defs>
    <marker id="arrowArch" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,1 L9,5 L0,9 Z" fill="#4B5563"/>
    </marker>
    <marker id="arrowGold" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,1 L9,5 L0,9 Z" fill="#F59E0B"/>
    </marker>
    <style>
      @keyframes fadeInBox { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
      .box1{animation:fadeInBox 0.6s ease both 0.1s}
      .box2{animation:fadeInBox 0.6s ease both 0.25s}
      .box3{animation:fadeInBox 0.6s ease both 0.4s}
      .box4{animation:fadeInBox 0.6s ease both 0.55s}
      .box5{animation:fadeInBox 0.6s ease both 0.7s}
    </style>
  </defs>

  <!-- Background -->
  <rect width="820" height="360" rx="12" fill="#0d1117"/>
  <text x="410" y="28" font-family="'Courier New', monospace" font-size="12" fill="#4B5563" text-anchor="middle">// architecture diagram — widget-templates</text>

  <!-- ─────────────── LAYER LABELS ─────────────── -->
  <!-- USER LAYER label -->
  <text x="12" y="76" font-family="monospace" font-size="9" fill="#4B5563" transform="rotate(-90,12,76)">USER</text>
  <!-- REPO LAYER label -->
  <text x="12" y="176" font-family="monospace" font-size="9" fill="#4B5563" transform="rotate(-90,12,176)">REPO</text>
  <!-- EMBED LAYER label -->
  <text x="12" y="268" font-family="monospace" font-size="9" fill="#4B5563" transform="rotate(-90,12,268)">EMBED</text>
  <!-- RENDER LAYER label -->
  <text x="12" y="338" font-family="monospace" font-size="9" fill="#4B5563" transform="rotate(-90,12,338)">RENDER</text>

  <!-- Layer background bands -->
  <rect x="26" y="44" width="782" height="56" rx="6" fill="#161b22" opacity="0.4"/>
  <rect x="26" y="112" width="782" height="56" rx="6" fill="#161b22" opacity="0.4"/>
  <rect x="26" y="180" width="782" height="80" rx="6" fill="#161b22" opacity="0.3"/>
  <rect x="26" y="272" width="782" height="56" rx="6" fill="#161b22" opacity="0.4"/>

  <!-- ─────────────── USER node ─────────────── -->
  <g class="box1">
    <rect x="320" y="50" width="180" height="44" rx="8" fill="#1e293b" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="410" y="69" font-family="monospace" font-size="11" fill="#F59E0B" text-anchor="middle" font-weight="bold">👤 Developer</text>
    <text x="410" y="84" font-family="monospace" font-size="9" fill="#4B5563" text-anchor="middle">opens repo, picks an SVG widget</text>
  </g>

  <!-- Arrow USER → REPO -->
  <line x1="410" y1="94" x2="410" y2="110" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrowArch)"/>

  <!-- ─────────────── REPO node ─────────────── -->
  <g class="box2">
    <rect x="250" y="118" width="320" height="44" rx="8" fill="#1e293b" stroke="#2563EB" stroke-width="1.5"/>
    <text x="410" y="137" font-family="monospace" font-size="11" fill="#2563EB" text-anchor="middle" font-weight="bold">📁 widget-templates / GitHub Repo</text>
    <text x="410" y="152" font-family="monospace" font-size="9" fill="#4B5563" text-anchor="middle">20 × standalone .svg files — no build, no compile, no nonsense</text>
  </g>

  <!-- Branch arrow REPO → left -->
  <line x1="410" y1="162" x2="410" y2="172" stroke="#4B5563" stroke-width="1.5"/>
  <line x1="175" y1="172" x2="645" y2="172" stroke="#4B5563" stroke-width="1.5"/>
  <line x1="175" y1="172" x2="175" y2="186" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrowArch)"/>
  <line x1="645" y1="172" x2="645" y2="186" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrowArch)"/>

  <!-- ─────────────── EMBED: GitHub Profile README ─────────────── -->
  <g class="box3">
    <rect x="60" y="186" width="230" height="60" rx="8" fill="#1e293b" stroke="#10B981" stroke-width="1.5"/>
    <text x="175" y="206" font-family="monospace" font-size="11" fill="#10B981" text-anchor="middle" font-weight="bold">🐙 GitHub Profile README</text>
    <text x="175" y="220" font-family="monospace" font-size="9" fill="#4B5563" text-anchor="middle">![Widget](./skills.svg)</text>
    <text x="175" y="236" font-family="monospace" font-size="9" fill="#4B5563" text-anchor="middle">raw SVG served via GitHub CDN</text>
  </g>

  <!-- ─────────────── EMBED: Personal Website ─────────────── -->
  <g class="box4">
    <rect x="530" y="186" width="230" height="60" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="1.5"/>
    <text x="645" y="206" font-family="monospace" font-size="11" fill="#a855f7" text-anchor="middle" font-weight="bold">🌐 Personal Website / HTML</text>
    <text x="645" y="220" font-family="monospace" font-size="9" fill="#4B5563" text-anchor="middle">&lt;img src="skills.svg" /&gt;</text>
    <text x="645" y="236" font-family="monospace" font-size="9" fill="#4B5563" text-anchor="middle">or inline SVG in HTML</text>
  </g>

  <!-- GitHub sanitization note (center) -->
  <rect x="330" y="194" width="160" height="44" rx="6" fill="#1e293b" stroke="#4B5563" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="410" y="210" font-family="monospace" font-size="9" fill="#4B5563" text-anchor="middle">GitHub sanitizes SVG:</text>
  <text x="410" y="222" font-family="monospace" font-size="9" fill="#FF5F57" text-anchor="middle">strips &lt;script&gt; + events</text>
  <text x="410" y="234" font-family="monospace" font-size="9" fill="#10B981" text-anchor="middle">preserves @keyframes ✓</text>

  <!-- Converge arrows to browser -->
  <line x1="175" y1="246" x2="175" y2="264" stroke="#4B5563" stroke-width="1.5"/>
  <line x1="645" y1="246" x2="645" y2="264" stroke="#4B5563" stroke-width="1.5"/>
  <line x1="175" y1="264" x2="645" y2="264" stroke="#4B5563" stroke-width="1.5"/>
  <line x1="410" y1="264" x2="410" y2="278" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#arrowGold)"/>

  <!-- ─────────────── RENDER: Browser ─────────────── -->
  <g class="box5">
    <rect x="270" y="278" width="280" height="44" rx="8" fill="#1e293b" stroke="#F59E0B" stroke-width="2"/>
    <text x="410" y="297" font-family="monospace" font-size="11" fill="#F59E0B" text-anchor="middle" font-weight="bold">🖥️ Browser — CSS Animation Engine</text>
    <text x="410" y="312" font-family="monospace" font-size="9" fill="#4B5563" text-anchor="middle">parses SVG XML · runs @keyframes · renders frames at 60fps</text>
  </g>

  <!-- Side annotation -->
  <text x="798" y="190" font-family="monospace" font-size="9" fill="#4B5563" text-anchor="end">no server</text>
  <text x="798" y="204" font-family="monospace" font-size="9" fill="#4B5563" text-anchor="end">no runtime</text>
  <text x="798" y="218" font-family="monospace" font-size="9" fill="#4B5563" text-anchor="end">no magic</text>
  <text x="798" y="232" font-family="monospace" font-size="9" fill="#4B5563" text-anchor="end">just files</text>

  <!-- Bottom label -->
  <text x="410" y="348" font-family="monospace" font-size="10" fill="#4B5563" text-anchor="middle">widget-templates · architecture · static-file deployment model</text>
</svg>
