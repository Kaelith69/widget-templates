<svg viewBox="0 0 550 200" xmlns="http://www.w3.org/2000/svg" width="550" height="200">
  <defs>
    <style>
      .mono { font-family: 'Courier New', monospace; }
      .network { animation: networkin 0.6s ease-out both; opacity: 0; }
      .n1{animation-delay:0.1s} .n2{animation-delay:0.2s} .n3{animation-delay:0.3s}
      .n4{animation-delay:0.4s} .n5{animation-delay:0.5s}
      @keyframes networkin { to { opacity: 1; } }
      .packet { animation: flow 3s linear infinite; opacity: 0; }
      .p1{animation-delay:0s} .p2{animation-delay:0.5s} .p3{animation-delay:1s}
      .p4{animation-delay:1.5s} .p5{animation-delay:2s} .p6{animation-delay:2.5s}
      @keyframes flow { 0% { opacity: 0; transform: translateX(-10px); } 10% { opacity: 1; } 90% { opacity: 1; } 100% { opacity: 0; transform: translateX(10px); } }
      .wave { animation: wave 2s ease-in-out infinite; }
      .w1{animation-delay:0s} .w2{animation-delay:0.3s} .w3{animation-delay:0.6s}
      @keyframes wave { 0%,100% { transform: scaleY(1); } 50% { transform: scaleY(1.5); } }
    </style>
  </defs>

  <rect width="550" height="200" rx="10" fill="#0d1117"/>
  <rect x="1" y="1" width="548" height="198" rx="9" fill="none" stroke="#21262d"/>

  <!-- Title -->
  <text x="275" y="25" text-anchor="middle" class="mono network n1" font-size="16" fill="#ffffff" font-weight="bold">Network Activity</text>

  <!-- Network topology -->
  <g class="network n2">
    <!-- Server -->
    <rect x="50" y="60" width="60" height="40" rx="5" fill="#161b22" stroke="#30363d"/>
    <text x="80" y="80" text-anchor="middle" class="mono" font-size="8" fill="#8b949e">SERVER</text>
    <text x="80" y="90" text-anchor="middle" class="mono" font-size="6" fill="#58a6ff">192.168.1.1</text>

    <!-- Router -->
    <circle cx="200" cy="80" r="25" fill="#161b22" stroke="#30363d"/>
    <text x="200" y="85" text-anchor="middle" class="mono" font-size="8" fill="#8b949e">ROUTER</text>

    <!-- Client 1 -->
    <rect x="320" y="50" width="50" height="30" rx="3" fill="#161b22" stroke="#30363d"/>
    <text x="345" y="68" text-anchor="middle" class="mono" font-size="7" fill="#8b949e">CLIENT</text>

    <!-- Client 2 -->
    <rect x="380" y="100" width="50" height="30" rx="3" fill="#161b22" stroke="#30363d"/>
    <text x="405" y="118" text-anchor="middle" class="mono" font-size="7" fill="#8b949e">CLIENT</text>

    <!-- Client 3 -->
    <rect x="440" y="70" width="50" height="30" rx="3" fill="#161b22" stroke="#30363d"/>
    <text x="465" y="88" text-anchor="middle" class="mono" font-size="7" fill="#8b949e">CLIENT</text>
  </g>

  <!-- Connections -->
  <g class="network n3">
    <line x1="110" y1="80" x2="175" y2="80" stroke="#58a6ff" stroke-width="2"/>
    <line x1="225" y1="80" x2="320" y2="65" stroke="#58a6ff" stroke-width="2"/>
    <line x1="225" y1="80" x2="380" y2="115" stroke="#58a6ff" stroke-width="2"/>
    <line x1="225" y1="80" x2="440" y2="85" stroke="#58a6ff" stroke-width="2"/>
  </g>

  <!-- Data packets -->
  <g class="network n4">
    <circle cx="110" cy="80" r="3" fill="#00ff80" class="packet p1"/>
    <circle cx="140" cy="80" r="3" fill="#00ff80" class="packet p2"/>
    <circle cx="170" cy="80" r="3" fill="#00ff80" class="packet p3"/>
    <circle cx="225" cy="75" r="3" fill="#0080ff" class="packet p4"/>
    <circle cx="270" cy="70" r="3" fill="#0080ff" class="packet p5"/>
    <circle cx="315" cy="65" r="3" fill="#0080ff" class="packet p6"/>
  </g>

  <!-- Activity waves -->
  <g class="network n5">
    <rect x="320" y="45" width="2" height="10" fill="#00ff80" class="wave w1"/>
    <rect x="325" y="45" width="2" height="8" fill="#00ff80" class="wave w2"/>
    <rect x="330" y="45" width="2" height="12" fill="#00ff80" class="wave w3"/>

    <rect x="380" y="95" width="2" height="10" fill="#0080ff" class="wave w1"/>
    <rect x="385" y="95" width="2" height="8" fill="#0080ff" class="wave w2"/>
    <rect x="390" y="95" width="2" height="12" fill="#0080ff" class="wave w3"/>

    <rect x="440" y="65" width="2" height="10" fill="#ff8000" class="wave w1"/>
    <rect x="445" y="65" width="2" height="8" fill="#ff8000" class="wave w2"/>
    <rect x="450" y="65" width="2" height="12" fill="#ff8000" class="wave w3"/>
  </g>

  <!-- Stats -->
  <g class="network n1">
    <text x="50" y="140" class="mono" font-size="10" fill="#8b949e">Active Connections: 3</text>
    <text x="50" y="155" class="mono" font-size="10" fill="#8b949e">Data Transfer: 2.4 GB</text>
    <text x="50" y="170" class="mono" font-size="10" fill="#8b949e">Ping: 12ms</text>

    <text x="250" y="140" class="mono" font-size="10" fill="#00ff80">↑ 1.2 MB/s</text>
    <text x="250" y="155" class="mono" font-size="10" fill="#0080ff">↓ 856 KB/s</text>
    <text x="250" y="170" class="mono" font-size="10" fill="#ff8000">⚠️ High latency detected</text>
  </g>
</svg>